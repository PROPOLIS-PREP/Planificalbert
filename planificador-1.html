<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0a1a"/>
<title>Planificador</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a1a; --s1:#111128; --s2:#1a1a38; --s3:#242450;
  --bd:rgba(120,120,255,.1); --bd2:rgba(120,120,255,.2);
  --tx:#e8e8ff; --mu:#6060a8;
  --ac:#7c6ff0; --acg:rgba(124,111,240,.14); --acb:rgba(124,111,240,.35);
  --or:#ff9340; --org:rgba(255,147,64,.14);
  --ok:#3ecf8e; --dn:#ff5f7e;
  --r:14px; --rs:9px;
  --sb:env(safe-area-inset-bottom,0px); --st:env(safe-area-inset-top,0px);
  --HH:64px;/* hour height */ --GS:7;/* grid start hour */
}
html{height:100%;}
body{height:100%;background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;
  -webkit-font-smoothing:antialiased;overflow:hidden;}
input,select,textarea,button{font-family:'Outfit',sans-serif;}
input[type=date],input[type=time]{color-scheme:dark;}
button{cursor:pointer;border:none;background:none;color:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px;}

/* ── APP SHELL ──────────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100dvh;max-width:1080px;
  margin:0 auto;padding:0 14px;
  padding-top:calc(var(--st) + 10px);
  padding-bottom:calc(var(--sb) + 70px);}

/* ── HEADER ─────────────────────────────────────────── */
.hdr{display:flex;align-items:center;gap:9px;padding-bottom:11px;
  border-bottom:1px solid var(--bd);margin-bottom:12px;flex-wrap:wrap;flex-shrink:0;}
.brand{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.brand-ico{font-size:1.3rem;}
.brand-name{font-size:1.05rem;font-weight:800;letter-spacing:-.03em;
  background:linear-gradient(120deg,#a89cf8 0%,#f472b6 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.srch{position:relative;flex:1;min-width:110px;max-width:200px;}
.srch input{width:100%;background:var(--s1);border:1px solid var(--bd);border-radius:var(--rs);
  padding:8px 10px 8px 28px;color:var(--tx);font-size:.78rem;outline:none;
  transition:border-color .15s;}
.srch input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acg);}
.srch input::placeholder{color:var(--mu);}
.srch-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);
  color:var(--mu);font-size:.78rem;pointer-events:none;}
.srch-dd{position:absolute;top:calc(100%+4px);left:0;right:0;
  background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r);
  z-index:400;box-shadow:0 12px 36px rgba(0,0,0,.6);overflow:hidden;}
.srch-row{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;
  font-size:.8rem;border-bottom:1px solid var(--bd);transition:background .1s;}
.srch-row:last-child{border-bottom:none;}
.srch-row:hover,.srch-row:active{background:var(--s2);}
.srch-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.srch-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.srch-days{font-size:.65rem;color:var(--mu);}
.srch-empty{padding:14px;text-align:center;color:var(--mu);font-size:.78rem;}
.tabs{display:flex;gap:2px;background:var(--s1);padding:3px;
  border-radius:var(--r);border:1px solid var(--bd);flex-shrink:0;}
.tab{padding:7px 12px;border-radius:var(--rs);font-size:.78rem;font-weight:600;
  color:var(--mu);transition:all .14s;white-space:nowrap;}
.tab.on{background:var(--ac);color:#fff;box-shadow:0 2px 14px rgba(124,111,240,.5);}
.tab:not(.on):hover,.tab:not(.on):active{color:var(--tx);background:var(--s2);}

/* ── NOTIFICATION BANNER ─────────────────────────────── */
.nb{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:linear-gradient(90deg,rgba(124,111,240,.2),rgba(244,114,182,.12));
  border:1px solid var(--acb);border-radius:var(--rs);
  font-size:.78rem;color:#c4b5fd;cursor:pointer;margin-bottom:12px;flex-shrink:0;
  transition:background .14s;}
.nb:hover,.nb:active{background:linear-gradient(90deg,rgba(124,111,240,.3),rgba(244,114,182,.2));}
.nb-arr{margin-left:auto;opacity:.7;}
.nb.ok{background:rgba(62,207,142,.1);border-color:rgba(62,207,142,.3);color:var(--ok);cursor:default;}
.nb.err{background:rgba(255,95,126,.08);border-color:rgba(255,95,126,.2);color:var(--dn);cursor:default;}

/* ── WEEK NAV ────────────────────────────────────────── */
.wk-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-shrink:0;}
.wk-lbl{flex:1;text-align:center;font-size:.9rem;font-weight:700;}
.wk-lbl span{color:var(--mu);font-size:.75rem;font-weight:400;margin-left:6px;}
.nav-b{width:34px;height:34px;border-radius:var(--rs);background:var(--s1);
  border:1px solid var(--bd);color:var(--tx);font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;transition:all .14s;}
.nav-b:hover,.nav-b:active{background:var(--s2);border-color:var(--ac);}
.hoy-b{padding:6px 13px;border-radius:var(--rs);background:var(--acg);
  border:1px solid var(--acb);color:var(--ac);font-size:.78rem;font-weight:700;
  transition:all .14s;}
.hoy-b:hover,.hoy-b:active{background:var(--ac);color:#fff;}

/* ── CALENDAR CONTAINER ──────────────────────────────── */
.cal-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);
  min-height:0;}
.cal-scroll{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;position:relative;}
.cal-inner{min-width:480px;}

/* Day headers row */
.dhdrs{display:grid;grid-template-columns:46px repeat(7,1fr);
  position:sticky;top:0;z-index:30;background:var(--s1);
  border-bottom:2px solid var(--bd2);}
.tc-sp{border-right:1px solid var(--bd);}
.dhdr{text-align:center;padding:8px 2px;border-left:1px solid var(--bd);}
.d-name{font-size:.58rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.07em;color:var(--mu);}
.d-num{font-size:1.1rem;font-weight:800;width:34px;height:34px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  margin:3px auto 0;cursor:pointer;transition:all .13s;line-height:1;}
.d-num:hover,.d-num:active{background:var(--s2);}
.d-num.hoy{background:linear-gradient(135deg,var(--ac),#9d6ff0);
  color:#fff;box-shadow:0 2px 14px rgba(124,111,240,.5);}
.d-num.hev::after{content:'';display:block;width:4px;height:4px;border-radius:50%;
  background:var(--or);margin:-5px auto 0;}

/* All-day row */
.adr{display:grid;grid-template-columns:46px repeat(7,1fr);
  border-bottom:1px solid var(--bd);min-height:26px;}
.adr-lbl{font-size:.52rem;color:var(--mu);text-align:right;padding:5px 5px 0 0;
  font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  border-right:1px solid var(--bd);}
.adc{border-left:1px solid var(--bd);padding:2px 2px;cursor:pointer;}
.ade{border-radius:3px;padding:2px 5px;font-size:.62rem;font-weight:700;
  margin-bottom:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Time grid */
.tgrid{display:grid;grid-template-columns:46px repeat(7,1fr);position:relative;}
.tlbl{height:var(--HH);border-right:1px solid var(--bd);
  font-size:.58rem;color:var(--mu);text-align:right;
  padding:0 5px;display:flex;align-items:flex-start;padding-top:3px;
  background:var(--s1);position:sticky;left:0;z-index:5;}
.hcell{border-left:1px solid var(--bd);border-top:1px solid var(--bd);
  height:var(--HH);position:relative;cursor:pointer;transition:background .1s;}
.hcell:hover,.hcell:active{background:rgba(124,111,240,.06);}
.hline{position:absolute;top:50%;left:0;right:0;
  border-top:1px dashed rgba(120,120,255,.05);pointer-events:none;}

/* Timed events */
.ev{position:absolute;border-radius:8px;padding:4px 7px;cursor:pointer;
  overflow:hidden;z-index:10;transition:filter .12s,transform .12s;
  border:1px solid rgba(0,0,0,.15);}
.ev:hover{filter:brightness(1.18);transform:scaleX(1.015);}
.ev-title{font-size:.68rem;font-weight:700;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-time{font-size:.56rem;color:rgba(255,255,255,.8);margin-top:1px;}

/* Current time indicator */
.now-line{position:absolute;left:0;right:0;pointer-events:none;z-index:20;display:flex;align-items:center;}
.now-dot{width:9px;height:9px;border-radius:50%;background:var(--dn);flex-shrink:0;}
.now-bar{flex:1;height:2px;background:var(--dn);border-radius:1px;}

/* ── MONTH VIEW ──────────────────────────────────────── */
.mv{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:16px;}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:12px;}
.mwdh{text-align:center;font-size:.58rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--mu);padding:5px 0;}
.mday{aspect-ratio:1;border-radius:8px;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;padding:4px 2px 3px;transition:background .12s;border:1px solid transparent;}
.mday:hover,.mday:active{background:var(--s2);}
.mday.today{background:var(--acg);border-color:var(--ac)!important;}
.mday.past{opacity:.32;}
.mday.empty{pointer-events:none;opacity:0;}
.mdn{font-size:.68rem;font-weight:600;line-height:1;margin-bottom:2px;}
.mday.today .mdn{color:var(--ac);font-weight:800;}
.mdots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;}
.mdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.mdot.dl{border-radius:2px;transform:rotate(45deg);}
.mlist{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);
  padding:14px;margin-top:14px;}
.mlist-lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--mu);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.mlist-lbl::before{content:'';width:10px;height:2px;background:var(--ac);border-radius:2px;}
.ev-row{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;
  border-radius:var(--rs);background:var(--s2);margin-bottom:5px;cursor:pointer;
  border:1px solid transparent;transition:border-color .12s;}
.ev-row:last-child{margin-bottom:0;}
.ev-row:hover,.ev-row:active{border-color:var(--bd2);}
.ev-bar{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0;min-height:22px;}
.ev-info{flex:1;min-width:0;}
.ev-name{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-name.done{text-decoration:line-through;color:var(--mu);}
.ev-meta{font-size:.62rem;color:var(--mu);margin-top:2px;display:flex;gap:5px;flex-wrap:wrap;}
.badge{padding:1px 5px;border-radius:3px;font-size:.57rem;font-weight:700;text-transform:uppercase;}
.bdn{background:rgba(255,95,126,.15);color:var(--dn);}
.bor{background:rgba(255,147,64,.15);color:var(--or);}
.bgr{background:rgba(62,207,142,.15);color:var(--ok);}
.bmn{background:var(--s3);color:var(--mu);}
.bac{background:var(--acg);color:var(--ac);}
.bpr-a{background:rgba(255,95,126,.12);color:var(--dn);}
.bpr-m{background:rgba(255,147,64,.12);color:var(--or);}
.bpr-b{background:rgba(62,207,142,.12);color:var(--ok);}
.ev-chk{width:18px;height:18px;border-radius:50%;border:2px solid;
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:9px;margin-top:1px;transition:all .13s;}

/* ── LISTS VIEW ──────────────────────────────────────── */
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:11px;}
.lcard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);
  padding:14px;cursor:pointer;transition:all .16s;overflow:hidden;}
.lcard:hover,.lcard:active{border-color:var(--acb);background:var(--s2);}
.lct{font-size:.92rem;font-weight:700;margin-bottom:3px;padding-left:10px;}
.lcm{font-size:.65rem;color:var(--mu);padding-left:10px;margin-bottom:7px;}
.lci{font-size:.7rem;color:var(--mu);padding:2px 0 2px 10px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lci.ck{text-decoration:line-through;opacity:.42;}
.pgb{background:var(--s3);border-radius:3px;height:4px;overflow:hidden;margin-top:9px;}
.pgf{height:100%;border-radius:3px;transition:width .5s;}
.pgt{font-size:.6rem;color:var(--mu);margin-top:3px;}
.lnew{border-style:dashed;display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:100px;gap:6px;color:var(--mu);font-size:.8rem;}
.lnew:hover,.lnew:active{border-color:var(--ac);color:var(--tx);background:var(--acg);}
.ldet{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:16px;}
.ldh{display:flex;align-items:center;gap:9px;margin-bottom:12px;}
.bkb{width:34px;height:34px;border-radius:var(--rs);background:var(--s2);
  border:1px solid var(--bd);color:var(--tx);display:flex;align-items:center;
  justify-content:center;font-size:1rem;flex-shrink:0;}
.ldtitle{font-weight:700;font-size:1rem;flex:1;border-left:3px solid;padding-left:10px;}
.ladd{display:flex;gap:7px;margin-bottom:10px;}
.litems{display:flex;flex-direction:column;gap:3px;}
.lirow{display:flex;align-items:center;gap:9px;padding:9px 10px;
  border-radius:var(--rs);background:var(--s2);transition:background .12s;}
.lirow:hover,.lirow:active{background:var(--s3);}
.lichk{width:18px;height:18px;border-radius:5px;border:2px solid var(--bd2);
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;}
.litxt{flex:1;font-size:.83rem;}
.litxt.ck{text-decoration:line-through;color:var(--mu);}
.lidel{width:22px;height:22px;border-radius:4px;background:rgba(255,95,126,.1);
  color:var(--dn);font-size:.78rem;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .12s;}
.lirow:hover .lidel,.lirow:active .lidel{opacity:1;}

/* ── MODAL ───────────────────────────────────────────── */
.ov{position:fixed;inset:0;background:rgba(4,4,16,.92);backdrop-filter:blur(10px);
  z-index:500;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--s1);border:1px solid var(--bd2);
  border-radius:22px 22px 0 0;padding:20px 18px calc(20px + var(--sb));
  width:100%;max-width:520px;max-height:92vh;overflow-y:auto;
  box-shadow:0 -8px 48px rgba(0,0,0,.7),0 0 0 1px rgba(124,111,240,.08);}
.mh{width:36px;height:4px;background:var(--s3);border-radius:2px;margin:0 auto 18px;}
.mtitle{font-size:1rem;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:7px;}
.mtitle em{background:linear-gradient(120deg,#a89cf8,#f472b6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:normal;}
.fg{margin-bottom:14px;}
.flbl{display:block;font-size:.6rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.09em;color:var(--mu);margin-bottom:6px;}
.fi,.fsel,.fta{width:100%;background:var(--s2);border:1px solid var(--bd);
  border-radius:var(--rs);padding:10px 12px;color:var(--tx);font-size:.88rem;
  outline:none;-webkit-appearance:none;transition:border-color .14s;}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acg);}
.fi::placeholder,.fta::placeholder{color:var(--mu);}
.fta{resize:none;min-height:62px;line-height:1.55;}
.tog2{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.tog3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.tog4{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.tog6{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.tb{padding:9px 6px;border-radius:var(--rs);border:1px solid var(--bd);
  background:var(--s2);color:var(--mu);font-size:.77rem;font-weight:600;
  text-align:center;transition:all .13s;}
.tb.on{background:var(--acg);border-color:var(--ac);color:var(--ac);}
.tb:active{opacity:.8;}
.time2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.csw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;
  transition:transform .13s,border-color .13s;flex-shrink:0;}
.csw:active{transform:scale(1.1);}
.csw.sel{border-color:#fff;transform:scale(1.15);}
.cswrow{display:flex;gap:8px;flex-wrap:wrap;}
.macts{display:flex;gap:8px;margin-top:20px;}
.mb{padding:12px 16px;border-radius:var(--rs);font-size:.85rem;font-weight:700;flex:1;transition:all .13s;}
.mb:active{opacity:.82;}
.mbp{background:linear-gradient(135deg,var(--ac),#9d6ff0);color:#fff;
  box-shadow:0 3px 16px rgba(124,111,240,.4);}
.mbs{background:var(--s2);color:var(--mu);border:1px solid var(--bd);}
.mbs:hover{color:var(--tx);background:var(--s3);}
.mbd{background:rgba(255,95,126,.12);color:var(--dn);border:1px solid rgba(255,95,126,.2);
  flex:0;padding:12px 14px;}
.mbd:hover{background:rgba(255,95,126,.22);}
.mb:disabled{opacity:.35;cursor:not-allowed;}

/* ── FAB ─────────────────────────────────────────────── */
.fab{position:fixed;bottom:calc(20px + var(--sb));right:16px;
  width:58px;height:58px;border-radius:50%;
  background:linear-gradient(135deg,var(--ac),#c084fc);color:#fff;
  font-size:1.7rem;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 22px rgba(124,111,240,.55);z-index:200;
  transition:transform .14s;-webkit-tap-highlight-color:transparent;}
.fab:active{transform:scale(.9);}

/* ── MISC ────────────────────────────────────────────── */
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.stl{font-size:1rem;font-weight:700;}
.sbadge{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--ac);background:var(--acg);padding:3px 9px;border-radius:4px;}
.empty{text-align:center;padding:28px 14px;color:var(--mu);}
.empty-ico{font-size:1.7rem;opacity:.38;margin-bottom:8px;}
.empty-txt{font-size:.8rem;line-height:1.55;}
.addbtn{width:100%;padding:10px;border-radius:var(--rs);border:1px dashed var(--bd);
  background:transparent;color:var(--mu);font-size:.8rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;margin-top:9px;}
.addbtn:hover,.addbtn:active{color:var(--tx);border-color:var(--ac);background:var(--acg);}

/* ── NOTIF SETTINGS ──────────────────────────────────── */
.notif-info{font-size:.72rem;color:var(--mu);line-height:1.6;margin-top:10px;padding:10px;
  background:var(--s2);border-radius:var(--rs);}
.notif-info b{color:var(--tx);}

@media(max-width:580px){
  .tabs .tab{padding:7px 9px;font-size:.72rem;}
  .wk-lbl{font-size:.8rem;}
  .dhdrs,.adr,.tgrid{min-width:420px;}
  .d-num{font-size:.95rem;width:30px;height:30px;}
}
@media(max-width:380px){
  .brand-name{font-size:.9rem;}
  .tabs .tab{padding:6px 7px;font-size:.7rem;}
}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div class="brand">
      <div class="brand-ico">◈</div>
      <div class="brand-name">Planificador</div>
    </div>
    <div class="srch">
      <span class="srch-ico">🔍</span>
      <input id="si" placeholder="Buscar…" autocomplete="off"/>
      <div id="sdd" style="display:none" class="srch-dd"></div>
    </div>
    <nav class="tabs" id="tabs">
      <button class="tab on" data-tab="wk">📅 Semana</button>
      <button class="tab" data-tab="mo">🗓 Mes</button>
      <button class="tab" data-tab="li">📋 Listas</button>
    </nav>
  </header>

  <div id="nb" style="display:none" class="nb">
    <span>🔔</span><span id="nb-txt">Activar notificaciones</span><span class="nb-arr">→</span>
  </div>

  <div id="v-wk" style="display:flex;flex-direction:column;flex:1;min-height:0;"></div>
  <div id="v-mo" style="display:none;overflow-y:auto;flex:1;"></div>
  <div id="v-li" style="display:none;overflow-y:auto;flex:1;"></div>
</div>

<button class="fab" id="fab">＋</button>

<div class="ov" id="ov" style="display:none;">
  <div class="modal"><div class="mh"></div><div id="mb-body"></div></div>
</div>

<script>
/* ── STORAGE ───────────────────────────────────────────────────────────── */
const S={
  g:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},
  s:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

/* ── STATE ─────────────────────────────────────────────────────────────── */
let evs=S.g('pl3-evs',[]);
let lists=S.g('pl3-lists',[]);
let curTab='wk';
let wkMon=getMon(new Date());
let curMo={y:new Date().getFullYear(),m:new Date().getMonth()};
let activeList=null;
const save=()=>{S.s('pl3-evs',evs);S.s('pl3-lists',lists);};

/* ── CONSTANTS ─────────────────────────────────────────────────────────── */
const HH=64, GS=7, GE=23;
const HOURS=Array.from({length:GE-GS},(_,i)=>GS+i);
const MONTHS=['Enero','Feb','Marzo','Abril','Mayo','Junio','Julio','Agosto','Sep','Octubre','Nov','Diciembre'];
const MONTHS_S=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const WD=['Lu','Ma','Mi','Ju','Vi','Sá','Do'];
const WDF=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const COLORS=['#7c6ff0','#ff5f7e','#ff9340','#3ecf8e','#38c9f5','#f472b6','#a78bfa','#fbbf24'];
const PRIO=[{v:'alta',l:'Alta',c:'#ff5f7e',i:'▲'},{v:'media',l:'Media',c:'#ff9340',i:'●'},{v:'baja',l:'Baja',c:'#38c9f5',i:'▼'}];
const RECUR=[{v:'none',l:'No repite'},{v:'daily',l:'↻ Diaria'},{v:'weekly',l:'↻ Semanal'},{v:'monthly',l:'↻ Mensual'}];
const RTIMED=[{v:5,l:'5 min'},{v:10,l:'10 min'},{v:15,l:'15 min'},{v:30,l:'30 min'},{v:60,l:'1 hora'},{v:120,l:'2 h'}];
const RDAY=[{v:0,l:'Mismo día'},{v:1,l:'1 día antes'},{v:2,l:'2 días'},{v:3,l:'3 días'},{v:7,l:'1 semana'}];

/* ── UTILS ─────────────────────────────────────────────────────────────── */
const uid=()=>Math.random().toString(36).slice(2,8)+Date.now().toString(36).slice(-4);
const pad=n=>String(n).padStart(2,'0');
const ymd=d=>d instanceof Date?`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`:d;
const today=()=>ymd(new Date());
const dU=s=>Math.ceil((new Date(s+'T12:00:00')-new Date(today()+'T12:00:00'))/86400000);
function getMon(d){const wd=d.getDay(),diff=wd===0?-6:1-wd,r=new Date(d);r.setDate(r.getDate()+diff);r.setHours(0,0,0,0);return r;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function wkDays(mon){return Array.from({length:7},(_,i)=>addDays(mon,i));}
const mDays=(y,m)=>new Date(y,m+1,0).getDate();
const fWD=(y,m)=>{const d=new Date(y,m,1).getDay();return d===0?6:d-1;};
const t2y=t=>{const[h,m]=t.split(':').map(Number);return((h*60+m)-GS*60)/60*HH;};
const durH=(s,e)=>{const[sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);return Math.max(((eh*60+em)-(sh*60+sm))/60*HH,26);};
const nowY=()=>{const n=new Date();return((n.getHours()*60+n.getMinutes())-GS*60)/60*HH;};
const tMins=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
const fmtT=t=>{const[h,m]=t.split(':').map(Number);return `${h>12?h-12:h===0?12:h}:${pad(m)}${h>=12?'pm':'am'}`;};
function nextRec(s,r){const d=new Date(s+'T12:00:00');if(r==='daily')d.setDate(d.getDate()+1);if(r==='weekly')d.setDate(d.getDate()+7);if(r==='monthly')d.setMonth(d.getMonth()+1);return ymd(d);}
function mk(tag,cls='',html='',sty=''){const e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;if(sty)e.style.cssText=sty;return e;}

/* ── NOTIFICATIONS ─────────────────────────────────────────────────────── */
function initNotif(){
  const bar=document.getElementById('nb');
  const perm=typeof Notification!=='undefined'?Notification.permission:'none';
  if(perm==='none'){bar.style.display='none';return;}
  if(perm==='granted'){bar.style.display='none';scheduleAll();return;}
  if(perm==='denied'){
    bar.className='nb err';bar.style.display='flex';
    document.getElementById('nb-txt').textContent='Notificaciones bloqueadas en este navegador';
    bar.onclick=null;return;
  }
  // default - ask
  bar.style.display='flex';
  document.getElementById('nb-txt').textContent='Toca para activar notificaciones de eventos';
  bar.onclick=async()=>{
    const r=await Notification.requestPermission();
    if(r==='granted'){bar.style.display='none';scheduleAll();}
    else{bar.className='nb err';document.getElementById('nb-txt').textContent='Notificaciones no disponibles en este navegador/dispositivo';bar.onclick=null;}
  };
}

function scheduleAll(){
  if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
  const now=new Date(),t=today();
  evs.forEach(ev=>{
    if(ev.completed)return;
    const key=`n-${ev.id}-${t}`;
    if(ev.isAllDay){
      const days=dU(ev.date);
      if(days>=0&&days<=(ev.reminderDays??1)&&!sessionStorage.getItem(key)){
        new Notification(`${ev.type==='deadline'?'⏰':'📅'} ${ev.title}`,
          {body:days===0?'¡Hoy!':days===1?'¡Mañana!':'En '+days+' días',icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1 1"><rect fill="%237c6ff0" width="1" height="1"/></svg>'});
        sessionStorage.setItem(key,'1');
      }
    }else if(ev.date===t){
      const[h,m]=ev.startTime.split(':').map(Number);
      const evT=new Date();evT.setHours(h,m,0,0);
      const nT=new Date(evT.getTime()-(ev.reminderMins||0)*60000);
      const delay=nT-now;
      if(delay>0&&delay<86400000){
        setTimeout(()=>{
          if(Notification.permission==='granted')
            new Notification(`📅 ${ev.title}`,{body:ev.reminderMins?`En ${ev.reminderMins} min`:'¡Ahora!'});
        },delay);
      }else if(delay>-300000&&delay<=0&&!sessionStorage.getItem(key)){
        new Notification(`📅 ${ev.title}`,{body:'¡Empieza ahora!'});
        sessionStorage.setItem(key,'1');
      }
    }
  });
}

/* ── EVENT CRUD ─────────────────────────────────────────────────────────── */
const addEv=ev=>{evs.push({...ev,id:uid(),completed:false});save();};
const updEv=(id,u)=>{const i=evs.findIndex(e=>e.id===id);if(i>=0)evs[i]={...evs[i],...u};save();};
const delEv=id=>{evs=evs.filter(e=>e.id!==id);save();};
function togEv(id){
  const ev=evs.find(e=>e.id===id);if(!ev)return;
  if(!ev.completed&&ev.recurrence&&ev.recurrence!=='none'){
    updEv(id,{completed:true,completedAt:today()});
    addEv({...ev,id:undefined,date:nextRec(ev.date,ev.recurrence),completed:false,completedAt:null});
  }else{updEv(id,{completed:!ev.completed,completedAt:!ev.completed?today():null});}
}

/* ── MODAL ──────────────────────────────────────────────────────────────── */
let _mf={};
function openModal(init={},preDate='',preTime=''){
  const isEdit=!!init.id;
  _mf={
    title:'',isAllDay:!preTime,date:preDate||today(),
    startTime:preTime||'09:00',
    endTime:preTime?pad(+preTime.split(':')[0]+1)+':'+preTime.split(':')[1]:'10:00',
    color:COLORS[0],notes:'',type:'specific',priority:null,
    reminderDays:1,reminderMins:15,recurrence:'none',
    ...init
  };
  buildModal(isEdit);
  document.getElementById('ov').style.display='flex';
  setTimeout(()=>{const i=document.querySelector('#mb-body .fi');if(i)i.focus();},80);
}

function buildModal(isEdit){
  const body=document.getElementById('mb-body');body.innerHTML='';
  const f=_mf;

  body.appendChild(Object.assign(mk('div','mtitle'),{innerHTML:`<em>${isEdit?'✏️':'✦'}</em> ${isEdit?'Editar evento':'Nuevo evento'}`}));

  // Title
  const fg1=mk('div','fg','<label class="flbl">Título</label>');
  const ti=mk('input','fi','',);ti.type='text';ti.placeholder='¿Qué hay que hacer?';ti.value=f.title;
  ti.oninput=e=>f.title=e.target.value;
  ti.onkeydown=e=>{if(e.key==='Enter'&&f.title.trim())saveM(isEdit);};
  fg1.appendChild(ti);body.appendChild(fg1);

  // Type: all-day vs timed
  const fg2=mk('div','fg','<label class="flbl">Tipo de evento</label>');
  const tog=mk('div','tog2');
  const b1=mk('button','tb'+(f.isAllDay?' on':''),'📅 Todo el día');
  const b2=mk('button','tb'+(!f.isAllDay?' on':''),'⏰ Con horario');
  b1.onclick=()=>{f.isAllDay=true;buildModal(isEdit);};
  b2.onclick=()=>{f.isAllDay=false;buildModal(isEdit);};
  tog.appendChild(b1);tog.appendChild(b2);fg2.appendChild(tog);body.appendChild(fg2);

  // Date
  const fg3=mk('div','fg','<label class="flbl">Fecha</label>');
  const di=mk('input','fi');di.type='date';di.value=f.date;di.onchange=e=>f.date=e.target.value;
  fg3.appendChild(di);body.appendChild(fg3);

  if(!f.isAllDay){
    // Time range
    const fg4=mk('div','fg','<label class="flbl">Horario (inicio — fin)</label>');
    const tr=mk('div','time2');
    const si=mk('input','fi');si.type='time';si.value=f.startTime;si.onchange=e=>f.startTime=e.target.value;
    const ei=mk('input','fi');ei.type='time';ei.value=f.endTime;ei.onchange=e=>f.endTime=e.target.value;
    tr.appendChild(si);tr.appendChild(ei);fg4.appendChild(tr);body.appendChild(fg4);
    // Reminder timed
    const fg5=mk('div','fg','<label class="flbl">Aviso antes</label>');
    const rt=mk('div','tog6');
    RTIMED.forEach(r=>{
      const b=mk('button','tb'+(f.reminderMins===r.v?' on':''),r.l);
      b.onclick=()=>{f.reminderMins=r.v;rt.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));b.classList.add('on');};
      rt.appendChild(b);
    });
    fg5.appendChild(rt);body.appendChild(fg5);
  }else{
    // Subtype
    const fg4=mk('div','fg','<label class="flbl">Subtipo</label>');
    const tt=mk('div','tog2');
    const t1=mk('button','tb'+(f.type==='specific'?' on':''),'📅 Día concreto');
    const t2=mk('button','tb'+(f.type==='deadline'?' on':''),'⏰ Fecha límite');
    t1.onclick=()=>{f.type='specific';t1.classList.add('on');t2.classList.remove('on');};
    t2.onclick=()=>{f.type='deadline';t2.classList.add('on');t1.classList.remove('on');};
    tt.appendChild(t1);tt.appendChild(t2);fg4.appendChild(tt);body.appendChild(fg4);
    // Priority
    const fg5=mk('div','fg');fg5.innerHTML='<label class="flbl">Prioridad <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:.6rem">(opcional)</span></label>';
    const pt=mk('div','tog3');
    PRIO.forEach(p=>{
      const b=mk('button','tb'+(f.priority===p.v?' on':''),`${p.i} ${p.l}`);
      if(f.priority===p.v)b.style.cssText=`border-color:${p.c};color:${p.c};background:${p.c}18;`;
      b.onclick=()=>{
        f.priority=f.priority===p.v?null:p.v;
        pt.querySelectorAll('.tb').forEach(x=>{x.classList.remove('on');x.style.cssText='';});
        if(f.priority){b.classList.add('on');b.style.cssText=`border-color:${p.c};color:${p.c};background:${p.c}18;`;}
      };
      pt.appendChild(b);
    });
    fg5.appendChild(pt);body.appendChild(fg5);
    // Recurrence
    const fg6=mk('div','fg','<label class="flbl">Repetición</label>');
    const rs=mk('select','fsel');
    RECUR.forEach(r=>{const o=mk('option');o.value=r.v;o.textContent=r.l;if(f.recurrence===r.v)o.selected=true;rs.appendChild(o);});
    rs.onchange=e=>f.recurrence=e.target.value;fg6.appendChild(rs);body.appendChild(fg6);
    // Reminder days
    const fg7=mk('div','fg','<label class="flbl">Aviso con antelación</label>');
    const rd=mk('select','fsel');
    RDAY.forEach(r=>{const o=mk('option');o.value=r.v;o.textContent=r.l;if(f.reminderDays===r.v)o.selected=true;rd.appendChild(o);});
    rd.onchange=e=>f.reminderDays=+e.target.value;fg7.appendChild(rd);body.appendChild(fg7);
  }

  // Color
  const fgC=mk('div','fg','<label class="flbl">Color</label>');
  const cr=mk('div','cswrow');
  COLORS.forEach(c=>{
    const sw=mk('div','csw'+(f.color===c?' sel':''),'','background:'+c);
    sw.onclick=()=>{f.color=c;cr.querySelectorAll('.csw').forEach(x=>x.classList.remove('sel'));sw.classList.add('sel');};
    cr.appendChild(sw);
  });
  fgC.appendChild(cr);body.appendChild(fgC);

  // Notes
  const fgN=mk('div','fg','<label class="flbl">Notas (opcional)</label>');
  const ta=mk('textarea','fta');ta.placeholder='Detalles, contexto, enlace…';ta.value=f.notes||'';
  ta.oninput=e=>f.notes=e.target.value;fgN.appendChild(ta);body.appendChild(fgN);

  // Actions
  const acts=mk('div','macts');
  if(isEdit){const d=mk('button','mb mbd','🗑');d.onclick=()=>{delEv(f.id);closeModal();render();};acts.appendChild(d);}
  const canc=mk('button','mb mbs','Cancelar');canc.onclick=closeModal;
  const ok=mk('button','mb mbp',isEdit?'Guardar':'Añadir');
  ok.onclick=()=>{if(f.title.trim())saveM(isEdit);};
  acts.appendChild(canc);acts.appendChild(ok);body.appendChild(acts);
}

function saveM(isEdit){
  if(isEdit)updEv(_mf.id,_mf);else addEv(_mf);
  closeModal();scheduleAll();render();
}
function closeModal(){document.getElementById('ov').style.display='none';}

/* ── LAYOUT OVERLAPPING EVENTS ─────────────────────────────────────────── */
function layoutEvs(arr){
  if(!arr.length)return[];
  const s=[...arr].sort((a,b)=>tMins(a.startTime)-tMins(b.startTime));
  const cols=[];const res=[];
  s.forEach(ev=>{
    const sm=tMins(ev.startTime),em=tMins(ev.endTime);
    let col=cols.findIndex(end=>end<=sm);
    if(col===-1){col=cols.length;cols.push(0);}
    cols[col]=em;res.push({...ev,col});
  });
  return res.map(e=>({...e,numCols:cols.length}));
}

/* ── WEEK VIEW ─────────────────────────────────────────────────────────── */
function renderWeek(){
  const v=document.getElementById('v-wk');v.innerHTML='';
  const days=wkDays(wkMon);const t=today();

  // Nav
  const nav=mk('div','wk-nav');
  const pb=mk('button','nav-b','‹');pb.onclick=()=>{wkMon=addDays(wkMon,-7);renderWeek();};
  const nb=mk('button','nav-b','›');nb.onclick=()=>{wkMon=addDays(wkMon,7);renderWeek();};
  const hb=mk('button','hoy-b','Hoy');hb.onclick=()=>{wkMon=getMon(new Date());renderWeek();};
  const d0=days[0],d6=days[6];
  const sm=d0.getMonth()===d6.getMonth();
  const lbl=sm?`${d0.getDate()} – ${d6.getDate()} ${MONTHS[d0.getMonth()]} ${d0.getFullYear()}`
    :`${d0.getDate()} ${MONTHS_S[d0.getMonth()]} – ${d6.getDate()} ${MONTHS_S[d6.getMonth()]} ${d6.getFullYear()}`;
  const wl=mk('div','wk-lbl',lbl);
  nav.appendChild(pb);nav.appendChild(wl);nav.appendChild(hb);nav.appendChild(nb);
  v.appendChild(nav);

  // Cal container
  const wrap=mk('div','cal-wrap');
  const scroll=mk('div','cal-scroll');
  const inner=mk('div','cal-inner');

  // Day headers
  const hdrs=mk('div','dhdrs');
  hdrs.appendChild(mk('div','tc-sp'));
  days.forEach(d=>{
    const ds=ymd(d);const isT=ds===t;
    const hasEv=evs.some(e=>e.date===ds&&!e.completed);
    const hdr=mk('div','dhdr');
    const wd=d.getDay()===0?6:d.getDay()-1;
    hdr.appendChild(mk('div','d-name',WD[wd]));
    const num=mk('div','d-num'+(isT?' hoy':'')+(hasEv&&!isT?' hev':''),d.getDate());
    num.onclick=()=>openModal({isAllDay:true},ds,'');
    hdr.appendChild(num);hdrs.appendChild(hdr);
  });
  inner.appendChild(hdrs);

  // All-day row
  const adr=mk('div','adr');
  adr.appendChild(mk('div','adr-lbl','todo<br>día'));
  days.forEach(d=>{
    const ds=ymd(d);
    const dayEvs=evs.filter(e=>e.date===ds&&e.isAllDay&&!e.completed);
    const col=mk('div','adc');
    col.onclick=()=>openModal({isAllDay:true},ds,'');
    dayEvs.slice(0,2).forEach(ev=>{
      const ae=mk('div','ade',ev.title,'background:'+ev.color+'28;color:'+ev.color+';border:1px solid '+ev.color+'55;');
      ae.onclick=e=>{e.stopPropagation();openModal(ev);};col.appendChild(ae);
    });
    adr.appendChild(col);
  });
  inner.appendChild(adr);

  // Time grid
  const grid=mk('div','tgrid');
  HOURS.forEach(h=>{
    grid.appendChild(mk('div','tlbl',h+':00'));
    days.forEach(()=>{const c=mk('div','hcell');c.appendChild(mk('div','hline'));grid.appendChild(c);});
  });
  inner.appendChild(grid);
  scroll.appendChild(inner);wrap.appendChild(scroll);v.appendChild(wrap);

  // Position timed events & now-line after DOM paint
  requestAnimationFrame(()=>{
    const cells=[...grid.querySelectorAll('.hcell')];
    if(!cells.length)return;
    const gRect=grid.getBoundingClientRect();
    const colRects=[];
    for(let i=0;i<7;i++){const r=cells[i].getBoundingClientRect();colRects.push({left:r.left-gRect.left,w:r.width});}

    days.forEach((d,di)=>{
      const ds=ymd(d);
      const timedEvs=evs.filter(e=>e.date===ds&&!e.isAllDay&&!e.completed);
      const laid=layoutEvs(timedEvs);
      const rc=colRects[di];
      laid.forEach(ev=>{
        const top=t2y(ev.startTime),h=durH(ev.startTime,ev.endTime);
        if(top>HH*(GE-GS)||h<=0)return;
        const cw=(rc.w-4)/ev.numCols;
        const el=mk('div','ev');
        el.style.cssText=`top:${top}px;height:${h}px;left:${rc.left+cw*ev.col+2}px;width:${cw}px;`+
          `background:linear-gradient(150deg,${ev.color},${ev.color}bb);`;
        el.appendChild(mk('div','ev-title',ev.title));
        if(h>42)el.appendChild(mk('div','ev-time',fmtT(ev.startTime)+' – '+fmtT(ev.endTime)));
        el.onclick=()=>openModal(ev);
        grid.appendChild(el);
      });

      // Now line on today's column
      if(ds===t){
        const ny=nowY();
        if(ny>=0&&ny<=HH*(GE-GS)){
          const nl=mk('div','now-line','','top:'+ny+'px;left:'+rc.left+'px;width:'+rc.w+'px;');
          nl.appendChild(mk('div','now-dot'));nl.appendChild(mk('div','now-bar'));
          grid.appendChild(nl);
        }
      }
    });

    // Scroll to current hour - 1
    const hr=Math.max(new Date().getHours()-1,GS);
    scroll.scrollTop=HH*(hr-GS);
  });

  // Hour cell click handler to create timed event
  grid.querySelectorAll('.hcell').forEach((cell,idx)=>{
    cell.onclick=()=>{
      const col=idx%7,row=Math.floor(idx/7);
      const h=GS+row;
      openModal({isAllDay:false},ymd(days[col]),pad(h)+':00');
    };
  });
}

/* ── MONTH VIEW ─────────────────────────────────────────────────────────── */
function renderMonth(){
  const v=document.getElementById('v-mo');v.innerHTML='';
  const{y,m}=curMo;const t=today();

  // Nav
  const nav=mk('div','wk-nav');
  nav.style.marginBottom='10px';
  const pb=mk('button','nav-b','‹');pb.onclick=()=>{curMo.m--;if(curMo.m<0){curMo.m=11;curMo.y--;}renderMonth();};
  const nb_=mk('button','nav-b','›');nb_.onclick=()=>{curMo.m++;if(curMo.m>11){curMo.m=0;curMo.y++;}renderMonth();};
  const hb=mk('button','hoy-b','Hoy');hb.onclick=()=>{curMo={y:new Date().getFullYear(),m:new Date().getMonth()};renderMonth();};
  nav.appendChild(pb);nav.appendChild(mk('div','wk-lbl',MONTHS[m]+' '+y));nav.appendChild(hb);nav.appendChild(nb_);
  v.appendChild(nav);

  const mv=mk('div','mv');
  const mg=mk('div','mgrid');
  WD.forEach(d=>mg.appendChild(mk('div','mwdh',d)));
  for(let i=0;i<fWD(y,m);i++)mg.appendChild(mk('div','mday empty'));
  const days=mDays(y,m);
  for(let d=1;d<=days;d++){
    const ds=`${y}-${pad(m+1)}-${pad(d)}`;
    const isT=ds===t,isPast=ds<t;
    const dayEvs=evs.filter(e=>e.date===ds);
    const cell=mk('div',`mday${isT?' today':''}${isPast?' past':''}`);
    cell.appendChild(mk('div','mdn',d));
    if(dayEvs.length){
      const dots=mk('div','mdots');
      dayEvs.slice(0,5).forEach(ev=>{
        const dot=mk('div','mdot'+(ev.type==='deadline'?' dl':''),'','background:'+ev.color);
        dot.onclick=e=>{e.stopPropagation();openModal(ev);};dots.appendChild(dot);
      });
      cell.appendChild(dots);
    }
    cell.onclick=()=>openModal({},ds,'');mg.appendChild(cell);
  }
  mv.appendChild(mg);v.appendChild(mv);

  // Event list for month
  const monthEvs=evs.filter(e=>e.date.startsWith(`${y}-${pad(m+1)}`))
    .sort((a,b)=>a.date.localeCompare(b.date)||(!a.isAllDay&&b.isAllDay?-1:0));
  if(monthEvs.length){
    const ml=mk('div','mlist');
    ml.appendChild(mk('div','mlist-lbl','Eventos del mes'));
    monthEvs.forEach(ev=>{
      const days_=dU(ev.date),pr=PRIO.find(p=>p.v===ev.priority);
      const row=mk('div','ev-row');
      const bar=mk('div','ev-bar','','background:'+ev.color);
      const info=mk('div','ev-info');
      const name=mk('div','ev-name'+(ev.completed?' done':''),ev.title);
      const meta=mk('div','ev-meta');
      if(pr)meta.innerHTML+=`<span class="badge bpr-${pr.v.charAt(0)}">${pr.i} ${pr.l}</span>`;
      const db=days_<0?'bdn':days_===0?'bor':days_<=3?'bac':'';
      const dl_=days_<0?'Vencida':days_===0?'Hoy':days_===1?'Mañana':days_+'d';
      if(db)meta.innerHTML+=`<span class="badge ${db}">${dl_}</span>`;
      if(!ev.isAllDay)meta.innerHTML+=`<span class="badge bmn">${fmtT(ev.startTime)}</span>`;
      if(ev.recurrence&&ev.recurrence!=='none')meta.innerHTML+='<span style="font-size:.7rem;color:var(--mu)">↻</span>';
      info.appendChild(name);info.appendChild(meta);
      const chk=mk('div','ev-chk');
      chk.style.cssText=`border-color:${ev.completed?ev.color:'rgba(120,120,255,.2)'};background:${ev.completed?ev.color+'28':'transparent'}`;
      if(ev.completed)chk.innerHTML=`<span style="color:${ev.color}">✓</span>`;
      chk.onclick=e=>{e.stopPropagation();togEv(ev.id);render();};
      row.appendChild(bar);row.appendChild(info);row.appendChild(chk);
      row.onclick=()=>openModal(ev);ml.appendChild(row);
    });
    v.appendChild(ml);
  }
}

/* ── LISTS VIEW ─────────────────────────────────────────────────────────── */
function renderLists(){
  const v=document.getElementById('v-li');v.innerHTML='';
  if(activeList){
    const list=lists.find(l=>l.id===activeList);
    if(!list){activeList=null;renderLists();return;}
    renderListDet(v,list);return;
  }
  const sh=mk('div','shdr');
  sh.appendChild(mk('div','stl','Mis listas'));
  sh.appendChild(mk('div','sbadge',`${lists.length} lista${lists.length!==1?'s':''}`));
  v.appendChild(sh);
  const g=mk('div','lgrid');
  lists.forEach(list=>{
    const done=list.items.filter(i=>i.checked).length;
    const pct=list.items.length?Math.round(done/list.items.length*100):0;
    const card=mk('div','lcard');
    const lt=mk('div','lct',list.title);lt.style.borderLeft=`3px solid ${list.color}`;card.appendChild(lt);
    card.appendChild(mk('div','lcm',`${list.items.length} elemento${list.items.length!==1?'s':''}`));
    list.items.slice(0,3).forEach(item=>card.appendChild(mk('div','lci'+(item.checked?' ck':''),(item.checked?'✓ ':'· ')+item.text)));
    if(list.items.length>3)card.appendChild(mk('div','lci','+'+(list.items.length-3)+' más…'));
    if(list.items.length){const pb=mk('div','pgb');const pf=mk('div','pgf','','width:'+pct+'%;background:'+list.color);pb.appendChild(pf);card.appendChild(pb);card.appendChild(mk('div','pgt',pct+'% completado'));}
    card.onclick=()=>{activeList=list.id;renderLists();};g.appendChild(card);
  });
  const nc=mk('div','lcard lnew');nc.innerHTML='<div style="font-size:1.5rem;opacity:.45">＋</div><span>Nueva lista</span>';
  nc.onclick=()=>openListModal();g.appendChild(nc);v.appendChild(g);
}

function renderListDet(v,list){
  const done=list.items.filter(i=>i.checked).length;
  const pct=list.items.length?Math.round(done/list.items.length*100):0;
  const det=mk('div','ldet');
  const hdr=mk('div','ldh');
  const bk=mk('button','bkb','←');bk.onclick=()=>{activeList=null;renderLists();};
  const tt=mk('div','ldtitle',list.title);tt.style.borderLeftColor=list.color;
  const cnt=mk('div','','','font-size:.7rem;color:var(--mu);margin-right:6px');cnt.textContent=done+'/'+list.items.length;
  const dl=mk('button','mb mbd','🗑');dl.style='flex:0;padding:8px 12px;';
  dl.onclick=()=>{lists=lists.filter(l=>l.id!==list.id);save();activeList=null;renderLists();};
  hdr.appendChild(bk);hdr.appendChild(tt);hdr.appendChild(cnt);hdr.appendChild(dl);det.appendChild(hdr);
  if(list.items.length){const pb=mk('div','pgb','','margin-bottom:12px');const pf=mk('div','pgf','','width:'+pct+'%;background:'+list.color);pb.appendChild(pf);const pt=mk('div','pgt',pct+'% completado');const pw=mk('div');pw.appendChild(pb);pw.appendChild(pt);det.appendChild(pw);}
  const la=mk('div','ladd');
  const ai=mk('input','fi');ai.type='text';ai.placeholder='Añadir elemento… (Enter)';
  const ab=mk('button','mb mbp','＋');ab.style='flex:0;padding:10px 14px;';
  const doAdd=()=>{if(!ai.value.trim())return;const i=lists.findIndex(l=>l.id===list.id);if(i>=0)lists[i].items.push({id:uid(),text:ai.value.trim(),checked:false});save();renderLists();};
  ai.onkeydown=e=>{if(e.key==='Enter')doAdd();};ab.onclick=doAdd;
  la.appendChild(ai);la.appendChild(ab);det.appendChild(la);
  const its=mk('div','litems');
  if(!list.items.length){const em=mk('div','empty');em.appendChild(mk('div','empty-ico','📝'));em.appendChild(mk('div','empty-txt','Lista vacía.'));its.appendChild(em);}
  list.items.forEach(item=>{
    const row=mk('div','lirow');
    const chk=mk('div','lichk');
    chk.style.cssText=`border-color:${item.checked?list.color:'rgba(120,120,255,.2)'};background:${item.checked?list.color+'22':'transparent'}`;
    if(item.checked)chk.innerHTML=`<span style="color:${list.color}">✓</span>`;
    chk.onclick=()=>{const li=lists.findIndex(l=>l.id===list.id);if(li>=0){const ii=lists[li].items.findIndex(i=>i.id===item.id);if(ii>=0)lists[li].items[ii].checked=!lists[li].items[ii].checked;}save();renderLists();};
    const tx=mk('span','litxt'+(item.checked?' ck':''),item.text);
    const dl_=mk('button','lidel','✕');dl_.onclick=()=>{const li=lists.findIndex(l=>l.id===list.id);if(li>=0)lists[li].items=lists[li].items.filter(i=>i.id!==item.id);save();renderLists();};
    row.appendChild(chk);row.appendChild(tx);row.appendChild(dl_);its.appendChild(row);
  });
  det.appendChild(its);v.appendChild(det);
  setTimeout(()=>ai.focus(),80);
}

function openListModal(){
  let title='',color=COLORS[0];
  const body=document.getElementById('mb-body');body.innerHTML='';
  body.appendChild(mk('div','mtitle','<em>📋</em> Nueva lista'));
  const fg1=mk('div','fg','<label class="flbl">Nombre</label>');
  const inp=mk('input','fi');inp.type='text';inp.placeholder='Brainstorming, Pendientes, Compras…';
  inp.oninput=e=>title=e.target.value;inp.onkeydown=e=>{if(e.key==='Enter'&&title.trim())saveList(title,color);};
  fg1.appendChild(inp);body.appendChild(fg1);
  const fg2=mk('div','fg','<label class="flbl">Color</label>');
  const cr=mk('div','cswrow');
  COLORS.forEach(c=>{const sw=mk('div','csw'+(c===color?' sel':''),'','background:'+c);sw.onclick=()=>{color=c;cr.querySelectorAll('.csw').forEach(x=>x.classList.remove('sel'));sw.classList.add('sel');};cr.appendChild(sw);});
  fg2.appendChild(cr);body.appendChild(fg2);
  const acts=mk('div','macts');
  const canc=mk('button','mb mbs','Cancelar');canc.onclick=closeModal;
  const ok=mk('button','mb mbp','Crear');ok.onclick=()=>{if(title.trim())saveList(title,color);};
  acts.appendChild(canc);acts.appendChild(ok);body.appendChild(acts);
  document.getElementById('ov').style.display='flex';
  setTimeout(()=>inp.focus(),80);
}
function saveList(t,c){lists.push({id:uid(),title:t,color:c,items:[],createdAt:today()});save();closeModal();renderLists();}

/* ── SEARCH ─────────────────────────────────────────────────────────────── */
function initSearch(){
  const inp=document.getElementById('si'),dd=document.getElementById('sdd');
  inp.addEventListener('input',()=>{
    const q=inp.value.trim();if(q.length<2){dd.style.display='none';return;}
    const res=evs.filter(e=>e.title.toLowerCase().includes(q.toLowerCase())||(e.notes&&e.notes.toLowerCase().includes(q.toLowerCase()))).slice(0,8);
    dd.innerHTML='';
    if(!res.length){dd.innerHTML='<div class="srch-empty">Sin resultados</div>';dd.style.display='block';return;}
    res.forEach(ev=>{
      const row=mk('div','srch-row');
      const dot=mk('div','srch-dot','','background:'+ev.color);
      const lbl=mk('span','srch-lbl',ev.title);if(ev.completed){lbl.style.opacity='.5';lbl.style.textDecoration='line-through';}
      const d=dU(ev.date);const dl_=mk('span','srch-days',d<0?'vencida':d===0?'hoy':d+'d');
      row.onclick=()=>{dd.style.display='none';inp.value='';openModal(ev);};
      row.appendChild(dot);row.appendChild(lbl);row.appendChild(dl_);dd.appendChild(row);
    });
    dd.style.display='block';
  });
  inp.addEventListener('keydown',e=>{if(e.key==='Escape'){inp.value='';dd.style.display='none';}});
  document.addEventListener('click',e=>{if(!document.querySelector('.srch').contains(e.target))dd.style.display='none';});
}

/* ── TAB & RENDER ────────────────────────────────────────────────────────── */
function setTab(tab){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  document.getElementById('v-wk').style.display=tab==='wk'?'flex':'none';
  if(tab==='wk')document.getElementById('v-wk').style.flexDirection='column';
  document.getElementById('v-wk').style.flex=tab==='wk'?'1':'';
  document.getElementById('v-wk').style.minHeight=tab==='wk'?'0':'';
  document.getElementById('v-mo').style.display=tab==='mo'?'block':'none';
  document.getElementById('v-li').style.display=tab==='li'?'block':'none';
  render();
}
function render(){
  if(curTab==='wk')renderWeek();
  else if(curTab==='mo')renderMonth();
  else renderLists();
}

/* ── INIT ────────────────────────────────────────────────────────────────── */
document.getElementById('tabs').addEventListener('click',e=>{
  const t=e.target.closest('[data-tab]');if(t)setTab(t.dataset.tab);
});
document.getElementById('fab').onclick=()=>openModal({},today(),'');
document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeModal();});
document.addEventListener('keydown',e=>{
  if(e.key==='n'&&!e.ctrlKey&&!e.metaKey&&!['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))openModal({},today(),'');
  if(e.key==='Escape')closeModal();
});

initSearch();
initNotif();
setTab('wk');
setInterval(()=>{if(curTab==='wk')renderWeek();},60000);

/* ── PWA: ICONO + MANIFEST ─────────────────────────────────────────────── */
(function(){
  // Genera el icono con canvas (192×192 y 512×512)
  function makeIcon(size){
    const c=document.createElement('canvas');
    c.width=c.height=size;const ctx=c.getContext('2d');
    const r=size*0.208; // radio esquinas
    // Fondo degradado
    const g=ctx.createLinearGradient(0,0,size,size);
    g.addColorStop(0,'#6d60e8');g.addColorStop(0.5,'#8b6ff0');g.addColorStop(1,'#c084fc');
    ctx.beginPath();
    ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);
    ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
    ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
    ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();
    ctx.fillStyle=g;ctx.fill();
    // Símbolo ◈
    const fs=Math.round(size*0.52);
    ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.font=`bold ${fs}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('◈',size/2,size/2+size*0.03);
    // Texto "P" pequeño debajo — solo en tamaño grande
    if(size>=512){
      ctx.font=`600 ${Math.round(size*0.1)}px 'Outfit',sans-serif`;
      ctx.fillStyle='rgba(255,255,255,0.6)';
      ctx.fillText('PLANIFICADOR',size/2,size*0.84);
    }
    return c.toDataURL('image/png');
  }

  const icon192=makeIcon(192);
  const icon512=makeIcon(512);

  // Apple touch icon
  const al=document.createElement('link');
  al.rel='apple-touch-icon';al.href=icon192;document.head.appendChild(al);

  // Apple splash / status bar
  const am=document.createElement('meta');
  am.name='apple-mobile-web-app-title';am.content='Planificador';document.head.appendChild(am);

  // Manifest dinámico
  const manifest={
    name:'Mi Planificador',
    short_name:'Planificador',
    description:'Calendario semanal, tareas y listas personales',
    display:'standalone',
    orientation:'portrait',
    background_color:'#0a0a1a',
    theme_color:'#7c6ff0',
    start_url:'.',
    scope:'.',
    lang:'es',
    icons:[
      {src:icon192,sizes:'192x192',type:'image/png',purpose:'any maskable'},
      {src:icon512,sizes:'512x512',type:'image/png',purpose:'any maskable'}
    ]
  };
  const ml=document.createElement('link');
  ml.rel='manifest';
  ml.href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(manifest));
  document.head.appendChild(ml);
})();
</script>
